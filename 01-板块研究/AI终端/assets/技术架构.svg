<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="460" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">一台 AI 终端的构成（SoC/NPU · CIS · 射频 · 存储 · 整机）</text>

  <!-- phone schematic (center) -->
  <g>
    <rect x="290" y="70" width="100" height="200" rx="18" fill="#EAF1FB" stroke="#3B6FB5" stroke-width="2"/>
    <rect x="302" y="86" width="76" height="130" rx="6" fill="#CFE0F5" stroke="#3B6FB5" stroke-width="1.2"/>
    <circle cx="340" cy="232" r="9" fill="#9AA7B5"/>
    <circle cx="340" cy="100" r="5" fill="#E0962A"/>
    <text x="340" y="320" text-anchor="middle" font-size="11" fill="#777">示意图：屏下 NPU SoC + 多摄 CIS + 射频 + 端侧存储 = AI 终端</text>
  </g>

  <!-- left cards -->
  <g font-size="11.5">
    <rect x="24" y="70" width="218" height="62" rx="8" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="40" y="92" font-weight="600" fill="#7A4B05">① 端侧 SoC（含 NPU）</text>
    <text x="40" y="110" fill="#7A4B05">CPU/GPU/NPU 集成</text>
    <text x="40" y="125" fill="#7A4B05">高通/苹果/瑞芯微/恒玄</text>

    <rect x="24" y="186" width="218" height="62" rx="8" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="40" y="208" font-weight="600" fill="#1F5E34">② CIS / 光学</text>
    <text x="40" y="226" fill="#1F5E34">图像传感器/镜头/模组</text>
    <text x="40" y="241" fill="#1F5E34">韦尔/舜宇/水晶光电</text>

    <rect x="24" y="302" width="218" height="62" rx="8" fill="#F3ECFB" stroke="#7A52A8"/>
    <text x="40" y="324" font-weight="600" fill="#4A2E6E">③ 射频前端</text>
    <text x="40" y="342" fill="#4A2E6E">通信信号链路</text>
    <text x="40" y="357" fill="#4A2E6E">卓胜微</text>
  </g>

  <!-- right cards -->
  <g font-size="11.5">
    <rect x="438" y="70" width="218" height="62" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="454" y="92" font-weight="600" fill="#1F3A5F">④ 端侧存储</text>
    <text x="454" y="110" fill="#1F3A5F">LPDDR / NAND / UFS</text>
    <text x="454" y="125" fill="#1F3A5F">大模型本地驻留（见存储模块）</text>

    <rect x="438" y="186" width="218" height="62" rx="8" fill="#FDECEC" stroke="#D9534F"/>
    <text x="454" y="208" font-weight="600" fill="#8A2B2B">⑤ 整机 / 代工</text>
    <text x="454" y="226" fill="#8A2B2B">AI 手机/PC/可穿戴</text>
    <text x="454" y="241" fill="#8A2B2B">小米/苹果/歌尔</text>

    <rect x="438" y="302" width="218" height="62" rx="8" fill="#FFF9F0" stroke="#E0962A" stroke-dasharray="5 4"/>
    <text x="454" y="324" font-weight="600" fill="#9A5B00">⚠️ 换机驱动</text>
    <text x="454" y="342" fill="#5A3A00">NPU 标配化→换机周期</text>
    <text x="454" y="357" fill="#5A3A00">单机价值量系统性上移</text>
  </g>

  <g stroke="#BBB" stroke-width="1.5" stroke-dasharray="4 3">
    <path d="M242 101 L290 150"/>
    <path d="M242 217 L300 170"/>
    <path d="M242 333 L310 250"/>
    <path d="M438 101 L390 150"/>
    <path d="M438 217 L380 170"/>
    <path d="M438 333 L390 250"/>
  </g>

  <text x="24" y="448" font-size="10" fill="#999">注：示意布局，非真实解剖比例。价值量最高的端侧 SoC（含 NPU）是 A 股核心机会所在。</text>
</svg>
