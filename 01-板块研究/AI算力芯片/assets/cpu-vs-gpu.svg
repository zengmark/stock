      <rect x="470" y="164" width="16" height="24"/><rect x="488" y="164" width="16" height="24"/><rect x="506" y="164" width="16" height="24"/><rect x="524" y="164" width="16" height="24"/><rect x="542" y="164" width="16" height="24"/><rect x="560" y="164" width="16" height="24"/><rect x="578" y="164" width="16" height="24"/><rect x="596" y="164" width="16" height="24"/><rect x="614" y="164" width="16" height="24"/><rect x="632" y="164" width="16" height="24"/><rect x="650" y="164" width="16" height="24"/><rect x="668" y="164" width="16" height="24"/><rect x="686" y="164" width="16" height="24"/><rect x="704" y="164" width="16" height="24"/><rect x="722" y="164" width="16" height="24"/><rect x="740" y="164" width="16" height="24"/>
      <rect x="470" y="190" width="16" height="24"/><rect x="488" y="190" width="16" height="24"/><rect x="506" y="190" width="16" height="24"/><rect x="524" y="190" width="16" height="24"/><rect x="542" y="190" width="16" height="24"/><rect x="560" y="190" width="16" height="24"/><rect x="578" y="190" width="16" height="24"/><rect x="596" y="190" width="16" height="24"/><rect x="614" y="190" width="16" height="24"/><rect x="632" y="190" width="16" height="24"/><rect x="650" y="190" width="16" height="24"/><rect x="668" y="190" width="16" height="24"/><rect x="686" y="190" width="16" height="24"/><rect x="704" y="190" width="16" height="24"/><rect x="722" y="190" width="16" height="24"/><rect x="740" y="190" width="16" height="24"/>
      <rect x="470" y="216" width="16" height="24"/><rect x="488" y="216" width="16" height="24"/><rect x="506" y="216" width="16" height="24"/><rect x="524" y="216" width="16" height="24"/><rect x="542" y="216" width="16" height="24"/><rect x="560" y="216" width="16" height="24"/><rect x="578" y="216" width="16" height="24"/><rect x="596" y="216" width="16" height="24"/><rect x="614" y="216" width="16" height="24"/><rect x="632" y="216" width="16" height="24"/><rect x="650" y="216" width="16" height="24"/><rect x="668" y="216" width="16" height="24"/><rect x="686" y="216" width="16" height="24"/><rect x="704" y="216" width="16" height="24"/><rect x="722" y="216" width="16" height="24"/><rect x="740" y="216" width="16" height="24"/>
