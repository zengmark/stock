      <rect x="470" y="86" width="16" height="24"/><rect x="488" y="86" width="16" height="24"/><rect x="506" y="86" width="16" height="24"/><rect x="524" y="86" width="16" height="24"/><rect x="542" y="86" width="16" height="24"/><rect x="560" y="86" width="16" height="24"/><rect x="578" y="86" width="16" height="24"/><rect x="596" y="86" width="16" height="24"/><rect x="614" y="86" width="16" height="24"/><rect x="632" y="86" width="16" height="24"/><rect x="650" y="86" width="16" height="24"/><rect x="668" y="86" width="16" height="24"/><rect x="686" y="86" width="16" height="24"/><rect x="704" y="86" width="16" height="24"/><rect x="722" y="86" width="16" height="24"/><rect x="740" y="86" width="16" height="24"/>
      <rect x="470" y="112" width="16" height="24"/><rect x="488" y="112" width="16" height="24"/><rect x="506" y="112" width="16" height="24"/><rect x="524" y="112" width="16" height="24"/><rect x="542" y="112" width="16" height="24"/><rect x="560" y="112" width="16" height="24"/><rect x="578" y="112" width="16" height="24"/><rect x="596" y="112" width="16" height="24"/><rect x="614" y="112" width="16" height="24"/><rect x="632" y="112" width="16" height="24"/><rect x="650" y="112" width="16" height="24"/><rect x="668" y="112" width="16" height="24"/><rect x="686" y="112" width="16" height="24"/><rect x="704" y="112" width="16" height="24"/><rect x="722" y="112" width="16" height="24"/><rect x="740" y="112" width="16" height="24"/>
