      <rect x="470" y="294" width="16" height="24"/><rect x="488" y="294" width="16" height="24"/><rect x="506" y="294" width="16" height="24"/><rect x="524" y="294" width="16" height="24"/><rect x="542" y="294" width="16" height="24"/><rect x="560" y="294" width="16" height="24"/><rect x="578" y="294" width="16" height="24"/><rect x="596" y="294" width="16" height="24"/><rect x="614" y="294" width="16" height="24"/><rect x="632" y="294" width="16" height="24"/><rect x="650" y="294" width="16" height="24"/><rect x="668" y="294" width="16" height="24"/><rect x="686" y="294" width="16" height="24"/><rect x="704" y="294" width="16" height="24"/><rect x="722" y="294" width="16" height="24"/><rect x="740" y="294" width="16" height="24"/>
    </g>
  </g>
  <!-- highlight a few cores as Tensor Core -->
  <g fill="#C0392B" opacity="0.85">
    <rect x="524" y="138" width="16" height="24"/>
    <rect x="614" y="164" width="16" height="24"/>
    <rect x="686" y="112" width="16" height="24"/>
    <rect x="560" y="242" width="16" height="24"/>
  </g>
  <text class="tx" x="755" y="120" fill="#C0392B">■ Tensor Core</text>
  <text class="tx" x="755" y="135" fill="#C0392B">（矩阵加速单元）</text>

  <!-- GPU caption -->
  <text class="ts" x="615" y="372" text-anchor="middle">上千～上万个核心，每个简单、只会并行算</text>
  <text class="tx" x="615" y="390" text-anchor="middle">适合：AI 训练/推理、图形渲染、科学计算</text>
  <text class="em"  x="615" y="410" text-anchor="middle">✅ 天生适合：海量矩阵乘法（AI 的本质）</text>

  <!-- Bottom takeaway -->
  <rect x="40" y="448" width="740" height="56" rx="6" fill="#F4F1Fb" stroke="#534AB7" stroke-width="0.6"/>
  <text class="th" x="410" y="470" text-anchor="middle">核心区别</text>
  <text class="ts" x="410" y="492" text-anchor="middle">CPU 追求「单核强、能判断」→ 擅长复杂串行任务；GPU 追求「核心多、能并行」→ 擅长海量简单运算（AI 矩阵乘法）</text>
</svg>
