<svg role="img" width="100%" viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg">
  <title>AI 算力芯片投资时钟</title>
  <desc>按 AI 发展阶段展示不同时期的最优投资标的，当前处于放量验证期向推理主导期过渡</desc>
  <style>
    .t  { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #3C3489; font-weight: 600; }
    .th { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #3C3489; font-weight: 600; }
    .ts { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #5F5E5A; font-weight: 400; }
    .tx { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 11px; fill: #5F5E5A; font-weight: 400; }
    .em { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #C0392B; font-weight: 600; }
    .now{ font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #C0392B; font-weight: 700; }
    .note { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 10px; fill: #888780; font-weight: 400; }
  </style>

  <text class="t" x="410" y="26" text-anchor="middle">AI 算力芯片投资时钟：跟着英伟达 roadmap 买什么</text>

  <!-- timeline arrow -->
  <line x1="50" y1="200" x2="770" y2="200" stroke="#8A8678" stroke-width="2"/>
  <polygon points="770,200 760,194 760,206" fill="#8A8678"/>
  <text class="note" x="780" y="204" dominant-baseline="central">时间</text>

  <!-- 4 stage boxes along timeline -->
  <!-- Stage 1 -->
  <rect x="50" y="80" width="170" height="100" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text class="th" x="135" y="100" text-anchor="middle">① 训练爆发期</text>
  <text class="ts" x="135" y="118" text-anchor="middle">2023–2024</text>
  <text class="tx" x="135" y="138" text-anchor="middle">大模型军备竞赛</text>
  <text class="tx" x="135" y="154" text-anchor="middle">训练算力短缺</text>
  <text class="em" x="135" y="174" text-anchor="middle">→ 英伟达</text>
  <circle cx="135" cy="200" r="6" fill="#185FA5"/>

  <!-- Stage 2 (current) -->
  <rect x="240" y="80" width="170" height="100" rx="6" fill="#FDEFCB" stroke="#C99A2E" stroke-width="1.4"/>
  <text class="th" x="325" y="100" text-anchor="middle">② 放量验证期</text>
  <text class="ts" x="325" y="118" text-anchor="middle">2025–2026</text>
  <text class="tx" x="325" y="138" text-anchor="middle">推理崛起 + ASIC 渗透</text>
  <text class="tx" x="325" y="154" text-anchor="middle">国产扭亏</text>
  <text class="em" x="325" y="174" text-anchor="middle">→ 英伟达+博通+寒武纪</text>
  <circle cx="325" cy="200" r="7" fill="#C99A2E" stroke="#C0392B" stroke-width="2"/>
  <text class="now" x="325" y="225" text-anchor="middle">▲ 当前</text>

  <!-- Stage 3 -->
  <rect x="430" y="80" width="170" height="100" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="th" x="515" y="100" text-anchor="middle">③ 推理主导期</text>
  <text class="ts" x="515" y="118" text-anchor="middle">2026–2027</text>
  <text class="tx" x="515" y="138" text-anchor="middle">推理算力超训练</text>
  <text class="tx" x="515" y="154" text-anchor="middle">ASIC 占比提升</text>
  <text class="em" x="515" y="174" text-anchor="middle">→ 博通+美光+寒武纪</text>
  <circle cx="515" cy="200" r="6" fill="#534AB7"/>

  <!-- Stage 4 -->
  <rect x="620" y="80" width="150" height="100" rx="6" fill="#FCE8E6" stroke="#C0392B" stroke-width="0.8"/>
  <text class="th" x="695" y="100" text-anchor="middle">④ 国产深化期</text>
  <text class="ts" x="695" y="118" text-anchor="middle">2027+</text>
  <text class="tx" x="695" y="138" text-anchor="middle">国产化率超 50%</text>
  <text class="tx" x="695" y="154" text-anchor="middle">国产芯片规模化</text>
  <text class="em" x="695" y="174" text-anchor="middle">→ 寒武纪+海光+中芯</text>
  <circle cx="695" cy="200" r="6" fill="#C0392B"/>

  <!-- bottom logic flow -->
  <rect x="50" y="250" width="720" height="60" rx="6" fill="#F4F1FB" stroke="#534AB7" stroke-width="0.6"/>
  <text class="th" x="410" y="272" text-anchor="middle">逻辑主线</text>
  <text class="ts" x="410" y="294" text-anchor="middle">训练通吃（英伟达）→ 推理崛起（ASIC+国产）→ 国产闭环（寒武纪+海光+中芯）</text>

  <!-- key insight -->
  <rect x="50" y="325" width="720" height="74" rx="6" fill="#FBF7EE" stroke="#C99A2E" stroke-width="0.6"/>
  <text class="th" x="410" y="347" text-anchor="middle">关键认知</text>
  <text class="ts" x="410" y="369" text-anchor="middle">推理爆发是打破英伟达一家独大的根本力量 —— 推理对成本更敏感，给了 ASIC 和国产芯片机会</text>
  <text class="ts" x="410" y="387" text-anchor="middle">越往后走，越要从「全球霸主」转向「国产弹性 + 推理 ASIC」</text>
</svg>
