<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <title>EML vs 硅光方案对比</title>
  <desc>EML方案使用8颗独立电吸收调制激光器，硅光方案使用1颗CW激光器加硅光芯片集成调制</desc>
  <text x="340" y="32" text-anchor="middle" font-family="sans-serif" font-size="15px" font-weight="500" fill="#2C2C2A">EML vs 硅光：调制方式决定成本结构</text>
  <rect x="80" y="52" width="220" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="190" y="72" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489">EML 方案（传统分立）</text>
  <rect x="380" y="52" width="220" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="490" y="72" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0F6E56">硅光方案（SiPh 集成）</text>
  <rect x="80" y="95" width="220" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="117" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489">8颗独立 EML 激光器</text>
  <text x="190" y="139" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#888780">InP材料 · 每颗自带调制器</text>
  <line x1="190" y1="151" x2="190" y2="175" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="70" y="175" width="240" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="203" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489">电吸收调制（激光器内部）</text>
  <line x1="190" y1="219" x2="190" y2="243" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="80" y="243" width="220" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="271" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489">合波器 WDM（8路 → 1路）</text>
  <line x1="190" y1="287" x2="190" y2="311" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="95" y="311" width="190" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="339" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489">DSP 解调 → 光纤输出</text>
  <text x="56" y="118" text-anchor="end" font-family="sans-serif" font-size="12px" fill="#888780">8x100G</text>
  <rect x="380" y="95" width="220" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="490" y="117" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0F6E56">1颗 CW 激光器</text>
  <text x="490" y="139" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#888780">只发光不调制 · 便宜</text>
  <line x1="490" y1="151" x2="490" y2="175" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="370" y="175" width="240" height="68" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="490" y="196" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0F6E56">硅光芯片（CMOS 工艺）</text>
  <text x="490" y="216" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#888780">1→8分光 + 8路MZ调制器 + 合波WDM</text>
  <text x="490" y="234" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">调制/分光/合波全部单片集成</text>
  <line x1="490" y1="243" x2="490" y2="267" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="395" y="267" width="190" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="490" y="295" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0F6E56">DSP 解调 → 光纤输出</text>
  <rect x="65" y="385" width="260" height="100" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="195" y="405" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#2C2C2A">EML 方案成本结构</text>
  <text x="85" y="428" font-family="sans-serif" font-size="12px" fill="#3C3489">光芯片 36.8%</text>
  <rect x="210" y="418" width="100" height="12" rx="3" fill="#CECBF6"/>
  <text x="85" y="450" font-family="sans-serif" font-size="12px" fill="#3C3489">DSP 27.9%</text>
  <rect x="210" y="440" width="75" height="12" rx="3" fill="#AFA9EC"/>
  <text x="85" y="472" font-family="sans-serif" font-size="12px" fill="#3C3489">器件+封装 ~35%</text>
  <rect x="210" y="462" width="40" height="12" rx="3" fill="#D3D1C7"/>
  <text x="195" y="480" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">总 BOM ≈ $398</text>
  <rect x="355" y="385" width="260" height="100" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="485" y="405" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#2C2C2A">硅光方案成本结构</text>
  <text x="375" y="428" font-family="sans-serif" font-size="12px" fill="#0F6E56">DSP 28.1%  ← 最大项</text>
  <rect x="565" y="418" width="45" height="12" rx="3" fill="#9FE1CB"/>
  <text x="375" y="450" font-family="sans-serif" font-size="12px" fill="#0F6E56">CW光源 9.4%</text>
  <rect x="565" y="440" width="73" height="12" rx="3" fill="#5DCAA5"/>
  <text x="375" y="472" font-family="sans-serif" font-size="12px" fill="#0F6E56">器件+封装 ~47%</text>
  <rect x="565" y="462" width="30" height="12" rx="3" fill="#D3D1C7"/>
  <text x="485" y="480" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">总 BOM ≈ $320（省 20%）</text>
</svg>