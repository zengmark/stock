<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <title>调制概念图解</title>
  <desc>调制就是将电信号编码到光信号上的过程：亮=1，灭=0</desc>

  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="15px" font-weight="500" fill="#2C2C2A">调制 = 把 0 和 1「写」到光上面</text>

  <!-- ANALOGY SECTION -->
  <text x="40" y="60" font-family="sans-serif" font-size="13px" font-weight="500" fill="#5F5E5A">打个比方：手电筒发摩尔斯电码</text>

  <rect x="40" y="75" width="40" height="16" rx="3" fill="#CECBF6"/>
  <text x="60" y="86" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#3C3489">亮</text>
  <rect x="88" y="75" width="16" height="16" rx="3" fill="#D3D1C7"/>
  <text x="96" y="86" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">灭</text>
  <rect x="112" y="75" width="40" height="16" rx="3" fill="#CECBF6"/>
  <text x="132" y="86" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#3C3489">亮</text>
  <rect x="160" y="75" width="16" height="16" rx="3" fill="#D3D1C7"/>
  <rect x="184" y="75" width="40" height="16" rx="3" fill="#CECBF6"/>
  <text x="204" y="86" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#3C3489">亮</text>
  <rect x="232" y="75" width="16" height="16" rx="3" fill="#D3D1C7"/>
  <rect x="256" y="75" width="16" height="16" rx="3" fill="#D3D1C7"/>
  <rect x="280" y="75" width="40" height="16" rx="3" fill="#CECBF6"/>
  <text x="300" y="86" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#3C3489">亮</text>
  <rect x="328" y="75" width="16" height="16" rx="3" fill="#D3D1C7"/>

  <text x="60" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#534AB7" font-weight="500">1</text>
  <text x="96" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#888780" font-weight="500">0</text>
  <text x="132" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#534AB7" font-weight="500">1</text>
  <text x="176" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#888780" font-weight="500">0</text>
  <text x="204" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#534AB7" font-weight="500">1</text>
  <text x="248" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#888780" font-weight="500">0</text>
  <text x="264" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#888780" font-weight="500">0</text>
  <text x="300" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#534AB7" font-weight="500">1</text>
  <text x="336" y="104" text-anchor="middle" font-family="monospace" font-size="12px" fill="#888780" font-weight="500">0</text>

  <text x="60" y="120" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">亮=1</text>
  <text x="132" y="120" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">亮=1</text>
  <text x="204" y="120" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">亮=1</text>
  <text x="300" y="120" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">亮=1</text>

  <text x="380" y="92" font-family="sans-serif" font-size="12px" fill="#5F5E5A">手电筒亮了就是「1」，灭了就是「0」</text>
  <text x="380" y="110" font-family="sans-serif" font-size="12px" fill="#888780">快速控制亮灭 = 调制 = 把信息写到光上</text>

  <!-- DIVIDER -->
  <line x1="40" y1="140" x2="640" y2="140" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- EML SECTION -->
  <text x="40" y="170" font-family="sans-serif" font-size="14px" font-weight="500" fill="#3C3489">EML 方案：激光器自己调制自己</text>

  <rect x="40" y="190" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="105" y="207" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#5F5E5A">电信号输入</text>
  <text x="105" y="223" text-anchor="middle" font-family="monospace" font-size="11px" fill="#534AB7">1010 0100 1011 ...</text>

  <line x1="170" y1="212" x2="210" y2="212" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="215" y="180" width="210" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="320" y="200" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#3C3489">EML 激光器（InP材料）</text>
  <text x="320" y="216" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#5F5E5A">发光 + 调制 一体</text>
  <text x="320" y="236" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#888780">电进来 → 激光器直接输出已调制的光</text>

  <line x1="425" y1="212" x2="460" y2="212" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="465" y="190" width="150" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="540" y="207" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#3C3489">光纤输出</text>
  <text x="540" y="223" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">已编码光信号</text>

  <rect x="40" y="260" width="575" height="28" rx="6" fill="#F1EFE8"/>
  <text x="105" y="278" font-family="sans-serif" font-size="12px" fill="#5F5E5A">每通道需要 1 颗 EML（800G = 8 颗），每颗既是光源又是调制器，单颗 ~$11</text>

  <!-- SIPH SECTION -->
  <text x="40" y="320" font-family="sans-serif" font-size="14px" font-weight="500" fill="#0F6E56">硅光方案：光源和调制「分家」</text>

  <rect x="40" y="340" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="105" y="355" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#0F6E56">CW 激光器</text>
  <text x="105" y="371" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">持续发光，不调制</text>

  <line x1="170" y1="362" x2="200" y2="362" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="205" y="335" width="230" height="54" rx="10" fill="#9FE1CB" fill-opacity="0.25" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="320" y="353" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#0F6E56">硅光调制芯片（CMOS工艺）</text>
  <text x="320" y="369" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#5F5E5A">连续光进入 → 8路电信号控制亮灭 → 输出</text>
  <text x="320" y="383" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#888780">调制不在激光器里，在硅芯片上完成</text>

  <line x1="435" y1="362" x2="470" y2="362" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="475" y="340" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="545" y="357" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#0F6E56">光纤输出</text>
  <text x="545" y="373" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">已编码光信号</text>

  <rect x="40" y="405" width="575" height="28" rx="6" fill="#F1EFE8"/>
  <text x="105" y="423" font-family="sans-serif" font-size="11px" fill="#5F5E5A">CW 光源只管发光（~$30 / 颗），8路调制集成在一颗便宜的硅芯片上</text>

  <!-- BOTTOM SUMMARY -->
  <rect x="40" y="455" width="600" height="48" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="475" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#2C2C2A">本质区别：调制器跟不跟激光器「住在一起」</text>
  <text x="340" y="495" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780">EML 住一起（贵） → 硅光分开住（便宜，但需要硅芯片来做调制）</text>
</svg>