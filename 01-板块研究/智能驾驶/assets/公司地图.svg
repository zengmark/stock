    <rect x="156" y="48" width="156" height="26" rx="6" fill="#FFF4E5" stroke="#E0962A"/><text x="234" y="65" text-anchor="middle" fill="#7A4B05">德赛西威 002920 · A</text>
    <rect x="324" y="48" width="156" height="26" rx="6" fill="#FFF4E5" stroke="#E0962A"/><text x="402" y="65" text-anchor="middle" fill="#7A4B05">科博达 603786 · A</text>
    <rect x="492" y="48" width="164" height="26" rx="6" fill="#FFF4E5" stroke="#E0962A"/><text x="574" y="65" text-anchor="middle" fill="#7A4B05">经纬恒润 688326 · A</text>
    <rect x="156" y="80" width="156" height="26" rx="6" fill="#FFF4E5" stroke="#E0962A"/><text x="234" y="97" text-anchor="middle" fill="#7A4B05">华阳集团 002906 · A</text>
