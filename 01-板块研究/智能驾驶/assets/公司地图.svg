    <rect x="324" y="354" width="156" height="26" rx="6" fill="#E8F0FE" stroke="#3B6FB5"/><text x="402" y="371" text-anchor="middle" fill="#1F3A5F">小鹏 9868 · 港</text>
    <rect x="492" y="354" width="164" height="26" rx="6" fill="#E8F0FE" stroke="#3B6FB5"/><text x="574" y="371" text-anchor="middle" fill="#1F3A5F">理想 2015 · 港</text>
    <rect x="156" y="386" width="156" height="26" rx="6" fill="#E8F0FE" stroke="#3B6FB5"/><text x="234" y="403" text-anchor="middle" fill="#1F3A5F">蔚来 9866 · 港</text>
