  <!-- legend -->
  <g font-size="11" fill="#666">
    <rect x="24" y="442" width="14" height="14" rx="3" fill="#E0962A"/><text x="44" y="453">域控/座舱</text>
    <rect x="130" y="442" width="14" height="14" rx="3" fill="#3C9D5B"/><text x="150" y="453">线控</text>
    <rect x="206" y="442" width="14" height="14" rx="3" fill="#7A52A8"/><text x="226" y="453">感知硬件</text>
    <rect x="312" y="442" width="14" height="14" rx="3" fill="#D9534F"/><text x="332" y="453">芯片/激光雷达</text>
    <rect x="448" y="442" width="14" height="14" rx="3" fill="#3B6FB5"/><text x="468" y="453">方案/整车</text>
  </g>

  <text x="24" y="482" font-size="10" fill="#999">注：·A=A股，·港股=中国香港，·美股=美国。涨红跌绿为 A 股配色习惯；芯片/激光雷达厂报表净利受优先股等干扰，看经调整口径。</text>
