<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="460" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">智能驾驶市场格局——「核心科技在港/美，零部件在 A 股」的分层</text>

  <!-- left panel: 港美核心科技 -->
  <g>
    <rect x="24" y="52" width="306" height="320" rx="10" fill="#FDECEC" stroke="#D9534F"/>
    <text x="44" y="80" font-size="14" font-weight="600" fill="#8A2B2B">港 / 美 · 核心科技（高壁垒）</text>

    <rect x="44" y="98" width="266" height="56" rx="8" fill="#FFFFFF" stroke="#D9534F"/>
    <text x="60" y="120" font-weight="600" fill="#8A2B2B">智驾芯片 SoC</text>
    <text x="60" y="138" fill="#8A2B2B">地平线 9660 / 黑芝麻 2533（港）</text>
    <text x="60" y="152" fill="#8A2B2B">Mobileye MBLY（美）· 英伟达（算力）</text>

    <rect x="44" y="162" width="266" height="56" rx="8" fill="#FFFFFF" stroke="#D9534F"/>
    <text x="60" y="184" font-weight="600" fill="#8A2B2B">激光雷达</text>
    <text x="60" y="202" fill="#8A2B2B">禾赛 HSAI（美）/ 速腾聚创 2498（港）</text>
    <text x="60" y="216" fill="#8A2B2B">中国厂商全球领跑</text>

    <rect x="44" y="226" width="266" height="56" rx="8" fill="#FFFFFF" stroke="#D9534F"/>
    <text x="60" y="248" font-weight="600" fill="#8A2B2B">智能化整车</text>
    <text x="60" y="266" fill="#8A2B2B">小鹏 9868 / 理想 2015 / 蔚来 9866（港）</text>
    <text x="60" y="280" fill="#8A2B2B">特斯拉 TSLA（美，FSD 纯视觉）</text>

    <text x="44" y="334" font-size="11.5" fill="#8A2B2B">特点：技术壁垒最高、估值弹性大</text>
    <text x="44" y="354" font-size="11.5" fill="#8A2B2B">芯片/激光雷达厂仍处盈利兑现期</text>
  </g>

  <!-- right panel: A股零部件 -->
  <g>
    <rect x="350" y="52" width="306" height="320" rx="10" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="370" y="80" font-size="14" font-weight="600" fill="#1F5E34">A 股 · 零部件（业绩已兑现）</text>

    <rect x="370" y="98" width="266" height="56" rx="8" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="386" y="120" font-weight="600" fill="#7A4B05">域控制器</text>
    <text x="386" y="138" fill="#7A4B05">德赛西威 / 科博达 / 经纬恒润</text>

    <rect x="370" y="162" width="266" height="56" rx="8" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="386" y="184" font-weight="600" fill="#1F5E34">线控底盘</text>
    <text x="386" y="202" fill="#1F5E34">伯特利（WCBS）· Aptiv（美/在A有业务）</text>

    <rect x="370" y="226" width="266" height="56" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="386" y="248" font-weight="600" fill="#1F3A5F">座舱 / 软件</text>
    <text x="386" y="266" fill="#1F3A5F">华阳集团 / 均胜电子 / 中科创达</text>

    <rect x="370" y="290" width="266" height="56" rx="8" fill="#F3ECFB" stroke="#7A52A8"/>
    <text x="386" y="312" font-weight="600" fill="#4A2E6E">感知硬件</text>
    <text x="386" y="330" fill="#4A2E6E">永新光学 / 联创电子 / 炬光科技</text>

    <text x="370" y="364" font-size="11.5" fill="#1F5E34">特点：业绩已兑现、增速稳健，确定性锚</text>
  </g>

  <!-- bottom callout -->
  <g>
    <rect x="24" y="388" width="632" height="58" rx="10" fill="#FFF9F0" stroke="#E0962A" stroke-dasharray="5 4"/>
    <text x="44" y="412" font-size="13" font-weight="600" fill="#9A5B00">⚠️ 投资含义：A 股赚「域控/线控/座舱/感知放量 + 国产替代」双击</text>
    <text x="44" y="432" font-size="12" fill="#5A3A00">芯片/激光雷达的纯科技标的在港/美 → 分层互补，按「确定性→弹性→期权」配置</text>
  </g>

  <text x="24" y="456" font-size="10" fill="#999">注：份额为行业研究共识性估算，非精确市占。涨红跌绿为 A 股配色习惯。</text>
</svg>
