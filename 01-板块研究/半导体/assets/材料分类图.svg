<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>半导体材料分类图</title>
  <desc>前道制造七大核心材料，标注全球格局、国产化率与 A 股代表公司</desc>

  <text x="40" y="40" font-size="14" font-weight="600" fill="#0C447C" font-family="sans-serif">半导体前道材料七大核心品类</text>
  <text x="40" y="62" font-size="11" fill="#5F5E5A" font-family="sans-serif">红字=国产代表；绿字=全球垄断方；括号内为国产化率（估）</text>

  <g font-family="sans-serif">
    <!-- 1 硅片 -->
    <rect x="30" y="90" width="195" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="42" y="114" font-size="13" font-weight="600" fill="#2C2C2A">硅片 Wafer</text>
    <text x="42" y="134" font-size="10.5" fill="#888780">全球：信越/SUMCO（>50%）</text>
    <text x="42" y="152" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">沪硅产业</tspan> / 立昂微（~20%）</text>

    <!-- 2 光刻胶 -->
    <rect x="245" y="90" width="195" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="257" y="114" font-size="13" font-weight="600" fill="#2C2C2A">光刻胶</text>
    <text x="257" y="134" font-size="10.5" fill="#888780">全球：JSR/信越/东京应化</text>
    <text x="257" y="152" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">彤程新材</tspan>/南大光电（&lt;5%）</text>

    <!-- 3 电子特气 -->
    <rect x="460" y="90" width="190" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="472" y="114" font-size="13" font-weight="600" fill="#2C2C2A">电子特气</text>
    <text x="472" y="134" font-size="10.5" fill="#888780">全球：法液空/林德/大阳日酸</text>
    <text x="472" y="152" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">华特气体</tspan>/金宏气体（~15%）</text>

    <!-- 4 靶材 -->
    <rect x="30" y="184" width="195" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="42" y="208" font-size="13" font-weight="600" fill="#2C2C2A">溅射靶材</text>
    <text x="42" y="228" font-size="10.5" fill="#888780">全球：日矿金属/霍尼韦尔</text>
    <text x="42" y="246" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">江丰电子</tspan>（~20%）</text>

    <!-- 5 湿化学品 -->
    <rect x="245" y="184" width="195" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="257" y="208" font-size="13" font-weight="600" fill="#2C2C2A">湿电子化学品</text>
    <text x="257" y="228" font-size="10.5" fill="#888780">全球：关东化学/巴斯夫</text>
    <text x="257" y="246" font-size="10.5" fill="#27AE60">A股：江化微/格林达/上海新阳</text>

    <!-- 6 CMP材料 -->
    <rect x="460" y="184" width="190" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="472" y="208" font-size="13" font-weight="600" fill="#2C2C2A">CMP 抛光材料</text>
    <text x="472" y="228" font-size="10.5" fill="#888780">全球：卡博特/陶氏</text>
    <text x="472" y="246" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">安集</tspan>(液)/<tspan fill="#C0392B" font-weight="500">鼎龙</tspan>(垫)</text>

    <!-- 7 掩膜版 -->
    <rect x="30" y="278" width="195" height="74" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
    <text x="42" y="302" font-size="13" font-weight="600" fill="#2C2C2A">掩膜版</text>
    <text x="42" y="322" font-size="10.5" fill="#888780">全球：福尼克斯/HOYA</text>
    <text x="42" y="340" font-size="10.5" fill="#27AE60">A股：清溢光电/路维光电（~10%）</text>

    <!-- 8 综合平台 -->
    <rect x="245" y="278" width="405" height="74" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
    <text x="257" y="302" font-size="13" font-weight="600" fill="#3C3489">前驱体 / 综合材料平台</text>
    <text x="257" y="322" font-size="10.5" fill="#888780">全球：默克/液化空气（前驱体主导）</text>
    <text x="257" y="340" font-size="10.5" fill="#27AE60">A股：<tspan fill="#C0392B" font-weight="500">雅克科技</tspan>（前驱体+特气，&lt;15%）/ 南大光电</text>
  </g>

  <rect x="30" y="380" width="620" height="84" rx="6" fill="#F1EFE8" stroke="none"/>
  <text x="50" y="406" font-size="12.5" font-weight="500" fill="#2C2C2A" font-family="sans-serif">耗材逻辑 · 重复消费 · 认证壁垒高</text>
  <text x="50" y="430" font-size="11.5" fill="#5F5E5A" font-family="sans-serif">每跑一道工序就消耗一批材料；一旦进入供应链（认证 1-3 年），替换成本极高，形成天然护城河。</text>
  <text x="50" y="452" font-size="11.5" fill="#5F5E5A" font-family="sans-serif">国产替代空间：光刻胶、CMP 抛光垫、前驱体等普遍低于 15%，是空间最大的方向。</text>
</svg>
