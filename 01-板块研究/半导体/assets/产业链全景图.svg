  <path d="M220 117L248 117" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M220 213L248 213" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M430 117L458 117" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M430 193L458 193" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M430 259L458 259" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M430 325L458 325" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="40" y="420" width="600" height="80" rx="6" fill="#F1EFE8" stroke="none"/>
  <text x="340" y="446" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A" font-family="sans-serif">关键投资逻辑</text>
  <text x="80" y="476" font-size="12" fill="#5F5E5A" font-family="sans-serif">上游设备 · 卖铲子最确定</text>
  <text x="290" y="476" font-size="12" fill="#5F5E5A" font-family="sans-serif">中游制造 · 战略核心载体</text>
  <text x="500" y="476" font-size="12" fill="#5F5E5A" font-family="sans-serif">下游需求 · AI 拉动增量</text>
