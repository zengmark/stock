  <rect x="250" y="196" width="180" height="34" rx="4" fill="white" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="217" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A" font-family="sans-serif">IDM / Fabless</text>
  <rect x="255" y="242" width="56" height="28" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="283" y="260" text-anchor="middle" font-size="10" fill="#5F5E5A" font-family="sans-serif">台积电</text>
  <rect x="315" y="242" width="50" height="28" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
