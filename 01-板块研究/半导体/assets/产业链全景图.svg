<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>半导体产业链全景图</title>
  <desc>上游设备与材料 → 中游晶圆制造 → 下游终端应用，各环节标注代表公司</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="180" height="36" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="130" y="62" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C" font-family="sans-serif">上游 · 设备与材料</text>

