<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="460" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">人形机器人产业链全景（核心零部件 → 整机集成 → 应用场景）</text>

  <!-- three stage boxes -->
  <g font-size="13">
    <rect x="24" y="56" width="190" height="74" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="119" y="84" text-anchor="middle" font-weight="600" fill="#1F3A5F">上游 · 核心零部件</text>
    <text x="119" y="104" text-anchor="middle" font-size="11" fill="#555">丝杠 / 减速器 / 电机</text>
    <text x="119" y="120" text-anchor="middle" font-size="11" fill="#555">传感器 / 控制器</text>

    <rect x="245" y="56" width="190" height="74" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="340" y="84" text-anchor="middle" font-weight="600" fill="#1F3A5F">中游 · 整机集成</text>
    <text x="340" y="104" text-anchor="middle" font-size="11" fill="#555">Tesla / 优必选 / 宇树</text>
    <text x="340" y="120" text-anchor="middle" font-size="11" fill="#555">Figure / Agility</text>

    <rect x="466" y="56" width="190" height="74" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="561" y="84" text-anchor="middle" font-weight="600" fill="#1F3A5F">下游 · 应用场景</text>
    <text x="561" y="104" text-anchor="middle" font-size="11" fill="#555">工厂装配 / 仓储搬运</text>
    <text x="561" y="120" text-anchor="middle" font-size="11" fill="#555">商业服务 / 家庭</text>
  </g>

  <!-- arrows -->
  <g stroke="#888" stroke-width="2" fill="none">
    <path d="M214 93 L243 93"/>
    <path d="M435 93 L464 93"/>
  </g>

  <!-- A股 component label -->
  <text x="24" y="166" font-size="13" font-weight="600" fill="#2C2C2A">A 股零部件（价值量最高、国产替代弹性最大）</text>

  <g font-size="12">
    <rect x="24" y="178" width="153" height="48" rx="6" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="100" y="198" text-anchor="middle" font-weight="600" fill="#7A4B05">丝杠 / 执行器总成</text>
    <text x="100" y="215" text-anchor="middle" fill="#7A4B05">北特/贝斯特/五洲新春</text>
    <text x="100" y="230" text-anchor="middle" fill="#7A4B05">三花/拓普</text>

    <rect x="190" y="178" width="153" height="48" rx="6" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="266" y="198" text-anchor="middle" font-weight="600" fill="#1F5E34">减速器</text>
    <text x="266" y="215" text-anchor="middle" fill="#1F5E34">绿的(谐波)</text>
    <text x="266" y="230" text-anchor="middle" fill="#1F5E34">双环/中大力德(RV)</text>

    <rect x="356" y="178" width="153" height="48" rx="6" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="432" y="198" text-anchor="middle" font-weight="600" fill="#1F3A5F">电机</text>
    <text x="432" y="215" text-anchor="middle" fill="#1F3A5F">鸣志(空心杯)</text>
    <text x="432" y="230" text-anchor="middle" fill="#1F3A5F">江苏雷利</text>

    <rect x="522" y="178" width="134" height="48" rx="6" fill="#F3ECFB" stroke="#7A52A8"/>
    <text x="589" y="198" text-anchor="middle" font-weight="600" fill="#4A2E6E">传感器</text>
    <text x="589" y="215" text-anchor="middle" fill="#4A2E6E">柯力(力矩)</text>
    <text x="589" y="230" text-anchor="middle" fill="#4A2E6E">奥比中光(3D视觉)</text>
  </g>

  <!-- 整机海外 -->
  <text x="24" y="262" font-size="13" font-weight="600" fill="#2C2C2A">整机（港股 / 美股，A 股几乎无纯整机）</text>
  <g font-size="12">
    <rect x="24" y="274" width="312" height="44" rx="6" fill="#FDECEC" stroke="#D9534F"/>
    <text x="40" y="294" font-weight="600" fill="#8A2B2B">港股 优必选 9880</text>
    <text x="40" y="311" fill="#8A2B2B">Walker S 工业版整机，港股唯一纯标的</text>

    <rect x="352" y="274" width="304" height="44" rx="6" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="368" y="294" font-weight="600" fill="#1F3A5F">美股 Tesla TSLA</text>
    <text x="368" y="311" fill="#1F3A5F">Optimus 研发方，机器人收入未单列（期权性）</text>
  </g>

  <!-- 错位 callout -->
  <g>
    <rect x="24" y="338" width="632" height="104" rx="10" fill="#FFF9F0" stroke="#E0962A" stroke-dasharray="5 4"/>
    <text x="44" y="364" font-size="14" font-weight="600" fill="#9A5B00">⚡ 板块「错位」：整机稀缺且在海外，A 股赚零部件放量 + 国产替代双击</text>
    <text x="44" y="388" font-size="12.5" fill="#5A3A00">· 丝杠 / 减速器是单机价值量最高、壁垒最强的环节（占 BOM 50%+），弹性最大</text>
    <text x="44" y="410" font-size="12.5" fill="#5A3A00">· 整机（优必选 / Tesla）是「期权性变量」——量产拐点决定行业天花板</text>
    <text x="44" y="432" font-size="12.5" fill="#5A3A00">· 端侧推理消耗 AI 算力，本板块与「AI 算力芯片 / 存储」互补而非替代</text>
  </g>

  <text x="24" y="452" font-size="10" fill="#999">注：本图为环节结构示意，非规模比例。涨红跌绿为 A 股配色习惯。</text>
</svg>
