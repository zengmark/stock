<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="460" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">一台人形机器人由什么组成（以 Tesla Optimus 为例）</text>

  <!-- robot schematic (center) -->
  <g>
    <!-- head -->
    <rect x="312" y="66" width="56" height="44" rx="12" fill="#EAF1FB" stroke="#3B6FB5" stroke-width="2"/>
    <circle cx="328" cy="88" r="5" fill="#3B6FB5"/>
    <circle cx="352" cy="88" r="5" fill="#3B6FB5"/>
    <!-- neck -->
    <rect x="332" y="110" width="16" height="12" fill="#9AA7B5"/>
    <!-- torso -->
    <rect x="300" y="122" width="80" height="120" rx="14" fill="#EAF1FB" stroke="#3B6FB5" stroke-width="2"/>
    <!-- chest core -->
    <circle cx="340" cy="170" r="14" fill="#FFF4E5" stroke="#E0962A" stroke-width="2"/>
    <!-- left arm -->
    <rect x="270" y="132" width="22" height="86" rx="10" fill="#E8F0FE" stroke="#3B6FB5" stroke-width="2"/>
    <!-- right arm -->
    <rect x="388" y="132" width="22" height="86" rx="10" fill="#E8F0FE" stroke="#3B6FB5" stroke-width="2"/>
    <!-- left leg -->
    <rect x="312" y="248" width="24" height="104" rx="10" fill="#E8F0FE" stroke="#3B6FB5" stroke-width="2"/>
    <!-- right leg -->
    <rect x="344" y="248" width="24" height="104" rx="10" fill="#E8F0FE" stroke="#3B6FB5" stroke-width="2"/>
    <!-- joint dots -->
    <circle cx="340" cy="122" r="4" fill="#E0962A"/>
    <circle cx="281" cy="134" r="4" fill="#E0962A"/>
    <circle cx="399" cy="134" r="4" fill="#E0962A"/>
    <circle cx="324" cy="248" r="4" fill="#E0962A"/>
    <circle cx="356" cy="248" r="4" fill="#E0962A"/>
    <text x="340" y="430" text-anchor="middle" font-size="11" fill="#777">示意图：关节=执行器，躯干=控制器+电池</text>
  </g>

  <!-- left cards -->
  <g font-size="11.5">
    <rect x="24" y="70" width="218" height="62" rx="8" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="40" y="92" font-weight="600" fill="#7A4B05">① 执行器（关节）</text>
    <text x="40" y="110" fill="#5A3A00">丝杠+电机+减速器+编码器</text>
    <text x="40" y="125" fill="#5A3A00">用量最大，三花/拓普/北特</text>

    <rect x="24" y="186" width="218" height="62" rx="8" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="40" y="208" font-weight="600" fill="#1F5E34">② 减速器</text>
    <text x="40" y="226" fill="#1F5E34">谐波(轻载)/RV(重载)</text>
    <text x="40" y="241" fill="#1F5E34">绿的/双环/中大力德</text>

    <rect x="24" y="302" width="218" height="62" rx="8" fill="#F3ECFB" stroke="#7A52A8"/>
    <text x="40" y="324" font-weight="600" fill="#4A2E6E">③ 传感器</text>
    <text x="40" y="342" fill="#4A2E6E">力矩(触觉)+3D视觉</text>
    <text x="40" y="357" fill="#4A2E6E">柯力/奥比中光</text>
  </g>

  <!-- right cards -->
  <g font-size="11.5">
    <rect x="438" y="70" width="218" height="62" rx="8" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="454" y="92" font-weight="600" fill="#1F3A5F">④ 大脑（控制器）</text>
    <text x="454" y="110" fill="#1F3A5F">端侧 AI + 运动规划</text>
    <text x="454" y="125" fill="#1F3A5F">偏软件/美股(Tesla)</text>

    <rect x="438" y="186" width="218" height="62" rx="8" fill="#E8F0FE" stroke="#3B6FB5"/>
    <text x="454" y="208" font-weight="600" fill="#1F3A5F">⑤ 电机</text>
    <text x="454" y="226" fill="#1F3A5F">空心杯/无框力矩</text>
    <text x="454" y="241" fill="#1F3A5F">鸣志/江苏雷利</text>

    <rect x="438" y="302" width="218" height="62" rx="8" fill="#FDECEC" stroke="#D9534F"/>
    <text x="454" y="324" font-weight="600" fill="#8A2B2B">⑥ 整机集成</text>
    <text x="454" y="342" fill="#8A2B2B">骨架/电池/总装</text>
    <text x="454" y="357" fill="#8A2B2B">优必选(港)/Tesla(美)</text>
  </g>

  <!-- connectors -->
  <g stroke="#BBB" stroke-width="1.5" stroke-dasharray="4 3">
    <path d="M242 101 L270 150"/>
    <path d="M242 217 L281 165"/>
    <path d="M242 333 L300 300"/>
    <path d="M438 101 L388 150"/>
    <path d="M438 217 L399 165"/>
    <path d="M438 333 L392 300"/>
  </g>

  <text x="24" y="448" font-size="10" fill="#999">注：示意布局，非真实解剖比例。价值量最高的执行器/丝杠是 A 股核心机会所在。</text>
</svg>
