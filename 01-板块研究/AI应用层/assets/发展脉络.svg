<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AI应用发展脉络</title>
  <desc>2022 ChatGPT → 2023 百模大战 → 2024 应用试探 → 2025 Agent元年 → 2026+ 推理爆发</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="70" y1="150" x2="620" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- nodes -->
  <g font-family="sans-serif" text-anchor="middle">
    <circle cx="90" cy="150" r="9" fill="#C0392B"/>
    <text x="90" y="125" font-size="12" font-weight="600" fill="#2C2C2A">2022.11</text>
    <text x="90" y="185" font-size="10.5" fill="#5F5E5A">ChatGPT 破圈</text>
    <text x="90" y="200" font-size="10.5" fill="#5F5E5A">算力第一波</text>

    <circle cx="215" cy="150" r="9" fill="#C0392B"/>
    <text x="215" y="125" font-size="12" font-weight="600" fill="#2C2C2A">2023</text>
    <text x="215" y="185" font-size="10.5" fill="#5F5E5A">百模大战</text>
    <text x="215" y="200" font-size="10.5" fill="#5F5E5A">供给过剩</text>

    <circle cx="340" cy="150" r="9" fill="#C0392B"/>
    <text x="340" y="125" font-size="12" font-weight="600" fill="#2C2C2A">2024</text>
    <text x="340" y="185" font-size="10.5" fill="#5F5E5A">应用试探收费</text>
    <text x="340" y="200" font-size="10.5" fill="#5F5E5A">端侧AI起步</text>

    <circle cx="465" cy="150" r="11" fill="#C0392B" stroke="#fff" stroke-width="2"/>
    <text x="465" y="122" font-size="12" font-weight="700" fill="#C0392B">2025</text>
    <text x="465" y="185" font-size="10.5" fill="#5F5E5A">Agent 元年</text>
    <text x="465" y="200" font-size="10.5" fill="#5F5E5A">推理消耗陡增</text>

    <circle cx="590" cy="150" r="9" fill="#27AE60"/>
    <text x="590" y="125" font-size="12" font-weight="600" fill="#2C2C2A">2026+</text>
    <text x="590" y="185" font-size="10.5" fill="#5F5E5A">推理爆发</text>
    <text x="590" y="200" font-size="10.5" fill="#5F5E5A">看收入兑现</text>
  </g>
</svg>
