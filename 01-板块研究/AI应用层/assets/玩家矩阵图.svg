<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AI应用玩家投资矩阵</title>
  <desc>按确定性/弹性划分四类优先级：巨头打底仓、SaaS看增速、A股挑利润、主题票小仓博弈</desc>

  <text x="40" y="34" font-size="13" font-weight="600" fill="#2C2C2A" font-family="sans-serif">投资优先级矩阵</text>

  <!-- Y axis: 确定性 -->
  <text x="22" y="180" font-size="11" fill="#888780" font-family="sans-serif" transform="rotate(-90 22 180)">确定性 →</text>
  <!-- X axis: 弹性 -->
  <text x="360" y="345" text-anchor="middle" font-size="11" fill="#888780" font-family="sans-serif">↑ 弹性（涨幅空间）</text>

  <!-- 高确定+中弹性：巨头 -->
  <rect x="120" y="70" width="200" height="90" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.8"/>
  <text x="220" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#27500A" font-family="sans-serif">⭐⭐⭐ 确定性现金流</text>
  <text x="220" y="122" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">腾讯 · 阿里 · 微软</text>
  <text x="220" y="138" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">Alphabet · Palantir</text>

  <!-- 高弹性+中确定：SaaS -->
  <rect x="350" y="70" width="200" height="90" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.8"/>
  <text x="450" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#0C447C" font-family="sans-serif">⭐⭐ 高成长 SaaS</text>
  <text x="450" y="122" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">Salesforce · ServiceNow</text>
  <text x="450" y="138" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">AppLovin · 金山办公</text>

  <!-- 中确定+低弹性：A股利润 -->
  <rect x="120" y="200" width="200" height="90" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text x="220" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#3C3489" font-family="sans-serif">⭐⭐ A股高景气龙头</text>
  <text x="220" y="252" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">同花顺 · 科大讯飞</text>
  <text x="220" y="268" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">焦点科技</text>

  <!-- 高弹性+低确定：主题 -->
  <rect x="350" y="200" width="200" height="90" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.8"/>
  <text x="450" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#2C2C2A" font-family="sans-serif">⭐ 主题弹性</text>
  <text x="450" y="252" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">三六零 · 商汤 · 第四范式</text>
  <text x="450" y="268" text-anchor="middle" font-size="10.5" fill="#5F5E5A" font-family="sans-serif">微盟 · 蓝色光标</text>

  <text x="340" y="322" text-anchor="middle" font-size="10.5" fill="#888780" font-family="sans-serif">策略：巨头打底仓 · SaaS 看增速 · A股挑利润兑现 · 主题票小仓博弈</text>
</svg>
