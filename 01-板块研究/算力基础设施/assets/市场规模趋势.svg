<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>算力基础设施细分市场规模趋势</title>
  <desc>全球 AI 服务器与液冷市场规模 2023-2026E 增长示意</desc>
  <text x="24" y="30" style="font-size:15px;font-weight:500;fill:#2C2C2A">细分市场规模趋势</text>

  <!-- 图例 -->
  <rect x="420" y="44" width="14" height="14" rx="3" fill="#378ADD"/>
  <text x="440" y="56" style="font-size:11px;fill:#1f2329">全球 AI 服务器（十亿美元）</text>
  <rect x="420" y="64" width="14" height="14" rx="3" fill="#BA7517"/>
  <text x="440" y="76" style="font-size:11px;fill:#1f2329">全球液冷（十亿美元）</text>

  <!-- 基线 -->
  <line x1="60" y1="300" x2="640" y2="300" stroke="#B4B2A9" stroke-width="1.5"/>

  <!-- AI服务器 柱 (2023=70,2024=110,2025=190,2026E=270) 高度比例 -->
  <rect x="90" y="246" width="60" height="54" rx="4" fill="#378ADD"/>
  <text x="120" y="240" text-anchor="middle" style="font-size:11px;fill:#1f2329">70</text>
  <rect x="210" y="208" width="60" height="92" rx="4" fill="#378ADD"/>
  <text x="240" y="202" text-anchor="middle" style="font-size:11px;fill:#1f2329">110</text>
  <rect x="330" y="138" width="60" height="162" rx="4" fill="#378ADD"/>
  <text x="360" y="132" text-anchor="middle" style="font-size:11px;fill:#1f2329">190</text>
  <rect x="450" y="84" width="60" height="216" rx="4" fill="#378ADD" opacity="0.7"/>
  <text x="480" y="78" text-anchor="middle" style="font-size:11px;fill:#1f2329">270E</text>

  <!-- 液冷 柱 (2023=20,2024=45,2025=120,2026E=160) -->
  <rect x="160" y="282" width="50" height="18" rx="4" fill="#BA7517"/>
  <text x="185" y="276" text-anchor="middle" style="font-size:10px;fill:#1f2329">20</text>
  <rect x="280" y="261" width="50" height="39" rx="4" fill="#BA7517"/>
  <text x="305" y="255" text-anchor="middle" style="font-size:10px;fill:#1f2329">45</text>
  <rect x="400" y="198" width="50" height="102" rx="4" fill="#BA7517"/>
  <text x="425" y="192" text-anchor="middle" style="font-size:10px;fill:#1f2329">120</text>
  <rect x="520" y="168" width="50" height="132" rx="4" fill="#BA7517" opacity="0.7"/>
  <text x="545" y="162" text-anchor="middle" style="font-size:10px;fill:#1f2329">160E</text>

  <!-- 年份 -->
  <text x="120" y="318" text-anchor="middle" style="font-size:11px;fill:#5a6573">2023</text>
  <text x="240" y="318" text-anchor="middle" style="font-size:11px;fill:#5a6573">2024</text>
  <text x="360" y="318" text-anchor="middle" style="font-size:11px;fill:#5a6573">2025</text>
  <text x="480" y="318" text-anchor="middle" style="font-size:11px;fill:#5a6573">2026E</text>

  <text x="24" y="346" style="font-size:10px;fill:#854F0B">注：柱状为量级示意（2026 年行业报告 2025 全年估算）。核心结论：液冷增速最快（渗透率拐点），AI 服务器体量最大。</text>
</svg>
