<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>算力基础设施发展脉络</title>
  <desc>2020-2022 通用服务器饱和 → 2023 AI 服务器回暖 → 2024 液冷成必选 → 2025 国产+推理 → 2026 液冷标配</desc>
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="24" y="30" style="font-size:15px;font-weight:500;fill:#2C2C2A">算力基础设施发展脉络</text>

  <!-- 时间轴 -->
  <line x1="60" y1="150" x2="640" y2="150" stroke="#B4B2A9" stroke-width="2"/>
  <!-- 节点 -->
  <circle cx="100" cy="150" r="7" fill="#888780"/>
  <circle cx="220" cy="150" r="7" fill="#378ADD"/>
  <circle cx="340" cy="150" r="7" fill="#378ADD"/>
  <circle cx="460" cy="150" r="7" fill="#BA7517"/>
  <circle cx="580" cy="150" r="7" fill="#BA7517"/>

  <!-- 上方标签 -->
  <text x="100" y="120" text-anchor="middle" style="font-size:12px;font-weight:500;fill:#1f2329">2020–22</text>
  <text x="220" y="120" text-anchor="middle" style="font-size:12px;font-weight:500;fill:#1f2329">2023</text>
  <text x="340" y="120" text-anchor="middle" style="font-size:12px;font-weight:500;fill:#1f2329">2024</text>
  <text x="460" y="120" text-anchor="middle" style="font-size:12px;font-weight:500;fill:#1f2329">2025</text>
  <text x="580" y="120" text-anchor="middle" style="font-size:12px;font-weight:500;fill:#1f2329">2026+</text>

  <!-- 下方描述 -->
  <text x="100" y="178" text-anchor="middle" style="font-size:10px;fill:#5a6573">通用服务器</text>
  <text x="100" y="193" text-anchor="middle" style="font-size:10px;fill:#5a6573">饱和低增长</text>
  <text x="220" y="178" text-anchor="middle" style="font-size:10px;fill:#5a6573">ChatGPT 引爆</text>
  <text x="220" y="193" text-anchor="middle" style="font-size:10px;fill:#5a6573">服务器订单回暖</text>
  <text x="340" y="178" text-anchor="middle" style="font-size:10px;fill:#5a6573">Blackwell 量产</text>
  <text x="340" y="193" text-anchor="middle" style="font-size:10px;fill:#5a6573">液冷成必选</text>
  <text x="460" y="178" text-anchor="middle" style="font-size:10px;fill:#5a6573">推理+国产算力</text>
  <text x="460" y="193" text-anchor="middle" style="font-size:10px;fill:#5a6573">AI 服务器双增</text>
  <text x="580" y="178" text-anchor="middle" style="font-size:10px;fill:#5a6573">液冷渗透率 20%+</text>
  <text x="580" y="193" text-anchor="middle" style="font-size:10px;fill:#5a6573">供配电/PCB 高景气</text>

  <text x="24" y="250" style="font-size:11px;fill:#5a6573">投资含义：2020–22 是「通用服务器存量博弈」；2023 起「AI 服务器增量盛宴」；2024 起分化到「液冷/PCB/电源」才是利润最厚处。</text>
</svg>
