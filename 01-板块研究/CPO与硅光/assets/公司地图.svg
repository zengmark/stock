<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="400" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">CPO 与硅光公司地图（A股 12 / 港股 0 / 美股 4）</text>

  <!-- A股 -->
  <text x="24" y="58" font-size="13" font-weight="600" fill="#C0392B">A 股（12 家，2025 年报）</text>
  <g font-size="11.5">
    <rect x="24" y="70" width="320" height="44" rx="6" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="36" y="90" fill="#9A5B00">光模块：中际旭创/新易盛/华工科技</text>
    <text x="36" y="106" fill="#9A5B00">剑桥科技/长芯博创/联特科技/德科立</text>
    <rect x="360" y="70" width="296" height="44" rx="6" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="372" y="90" fill="#1F3A5F">光器件：天孚通信/太辰光</text>
    <text x="372" y="106" fill="#1F3A5F">光芯片+模块：光迅科技</text>
    <rect x="24" y="122" width="320" height="30" rx="6" fill="#EAF7EE" stroke="#3C9D5B"/>
    <text x="36" y="142" fill="#1F5E34">激光器芯片：源杰科技（硅光光源）</text>
    <rect x="360" y="122" width="296" height="30" rx="6" fill="#F3ECF8" stroke="#7A52A8"/>
    <text x="372" y="142" fill="#4A2E63">交换芯片：盛科通信（L4 网络层）</text>
  </g>

  <!-- 港股 -->
  <text x="24" y="186" font-size="13" font-weight="600" fill="#888">港股（0 家纯 CPO/硅光 标的）</text>
  <rect x="24" y="196" width="632" height="36" rx="6" fill="#F2F4F7" stroke="#bbb"/>
  <text x="40" y="219" font-size="11.5" fill="#555">无纯正标的（昂纳科技已私有化转 A 股）；中兴/长飞/鸿腾为相关非纯正，详见港股子文件</text>

  <!-- 美股 -->
  <text x="24" y="260" font-size="13" font-weight="600" fill="#2C3E90">美股（4 家，最新财年 + 单季）</text>
  <g font-size="11.5">
    <rect x="24" y="272" width="312" height="40" rx="6" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="36" y="292" fill="#9A5B00">博通 AVGO　$638.87亿 <tspan fill="#C0392B">+23.87%</tspan></text>
    <text x="36" y="306" fill="#9A5B00">CPO/3.5D + Tomahawk 交换（规则制定者）</text>
    <rect x="344" y="272" width="312" height="40" rx="6" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="356" y="292" fill="#1F3A5F">Coherent/Lumentum/AAOI　光材料·器件·模块</text>
    <text x="356" y="306" fill="#1F3A5F">Coherent $58.10亿 / Lumentum $16.45亿 / AAOI $4.56亿</text>
  </g>

  <!-- 核心认知 -->
  <g>
    <rect x="24" y="330" width="632" height="50" rx="8" fill="#FFF9F0" stroke="#E0962A"/>
    <text x="40" y="352" font-size="12.5" font-weight="600" fill="#9A5B00">核心认知</text>
    <text x="40" y="370" font-size="12" fill="#5A3A00">A股赚制造放量（光模块/光器件），美股买底层布局（博通/Coherent）；确定性看天孚/光迅/博通，弹性看中际/新易盛</text>
  </g>
</svg>
