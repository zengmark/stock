<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="680" height="380" fill="#FBFBF9"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#2C2C2A">CPO 与硅光 · 产业链全景</text>

  <!-- 上游 -->
  <text x="24" y="60" font-size="13" font-weight="600" fill="#3B6FB5">上游（材料 / 芯片）</text>
  <g font-size="11.5">
    <rect x="24" y="72" width="180" height="40" rx="6" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="36" y="92" fill="#1F3A5F">激光器芯片 VCSEL/DFB</text>
    <text x="36" y="106" fill="#1F3A5F">源杰 · Coherent · Lumentum</text>
    <rect x="24" y="120" width="180" height="40" rx="6" fill="#EAF1FB" stroke="#3B6FB5"/>
    <text x="36" y="140" fill="#1F3A5F">磷化铟 / 硅光衬底</text>
    <text x="36" y="154" fill="#1F3A5F">光迅 · Coherent</text>
  </g>

  <!-- 中游 -->
  <text x="250" y="60" font-size="13" font-weight="600" fill="#E0962A">中游（光引擎 / 模块）</text>
  <g font-size="11.5">
    <rect x="250" y="72" width="190" height="40" rx="6" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="262" y="92" fill="#9A5B00">光器件（插芯/连接器）</text>
    <text x="262" y="106" fill="#9A5B00">天孚 · 太辰光</text>
    <rect x="250" y="120" width="190" height="40" rx="6" fill="#FFF4E5" stroke="#E0962A"/>
    <text x="262" y="140" fill="#9A5B00">光模块（可插拔/CPO）</text>
    <text x="262" y="154" fill="#9A5B00">中际旭创 · 新易盛 · 华工</text>
  </g>

  <!-- 下游 -->
  <text x="476" y="60" font-size="13" font-weight="600" fill="#7A52A8">下游（系统 / 客户）</text>
  <g font-size="11.5">
    <rect x="476" y="72" width="180" height="40" rx="6" fill="#F3ECF8" stroke="#7A52A8"/>
    <text x="488" y="92" fill="#4A2E63">交换芯片（指挥中枢）</text>
    <text x="488" y="106" fill="#4A2E63">博通 · 盛科</text>
    <rect x="476" y="120" width="180" height="40" rx="6" fill="#F3ECF8" stroke="#7A52A8"/>
    <text x="488" y="140" fill="#4A2E63">交换机 / AI 加速卡</text>
    <text x="488" y="154" fill="#4A2E63">Arista · 英伟达 · 云厂商</text>
  </g>

  <!-- 箭头 -->
  <g stroke="#888" stroke-width="2" fill="none">
    <path d="M210 92 H246"/><path d="M210 140 H246"/>
    <path d="M444 92 H472"/><path d="M444 140 H472"/>
  </g>

  <!-- 核心认知 -->
  <g>
    <rect x="24" y="280" width="632" height="70" rx="8" fill="#FFF9F0" stroke="#E0962A"/>
    <text x="40" y="306" font-size="13" font-weight="600" fill="#9A5B00">核心认知</text>
    <text x="40" y="328" font-size="12" fill="#5A3A00">A股强在中游制造（光模块/光器件），美股强在上游布局与整机生态；博通是 CPO/机柜光互联的「规则制定者」</text>
    <text x="40" y="344" font-size="12" fill="#5A3A00">投资：上游卖铲人（天孚/光迅/博通）确定性高，中游光模块（中际/新易盛）业绩弹性大</text>
  </g>
</svg>
