<svg role="img" width="100%" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <title>FC-BGA and Fan-out WLCSP packaging cross-section comparison</title>
  <desc>Side-by-side cross-sections showing FC-BGA flip-chip packaging and Fan-out wafer-level packaging</desc>
  <style>
    .t  { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #3C3489; font-weight: 500; }
    .th { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #3C3489; font-weight: 500; }
    .ts { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #5F5E5A; font-weight: 400; }
    .tx { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 11px; fill: #5F5E5A; font-weight: 400; }
  </style>

  <line x1="400" y1="35" x2="400" y2="280" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

  <text class="t" x="195" y="28" text-anchor="middle">FC-BGA（倒装球栅阵列）</text>
  <text class="t" x="605" y="28" text-anchor="middle">Fan-out 扇出型封装</text>

  <!-- ========== FC-BGA SIDE ========== -->

  <!-- Die (flipped) -->
  <rect x="80" y="40" width="180" height="48" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="170" y="58" text-anchor="middle" dominant-baseline="central">芯片 (Die) — 倒扣放置</text>
  <text class="tx" x="170" y="75" text-anchor="middle" dominant-baseline="central">有源面朝下，背面裸露</text>
  <!-- Bumps on die bottom surface -->
  <circle cx="110" cy="88" r="5" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="140" cy="88" r="5" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="170" cy="88" r="5" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="200" cy="88" r="5" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="230" cy="88" r="5" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>

  <!-- Underfill layer -->
  <rect x="75" y="93" width="190" height="10" rx="2" fill="#FAC775" stroke="#BA7517" stroke-width="0.5" opacity="0.6"/>
  <text class="tx" x="170" y="100" text-anchor="middle" dominant-baseline="central" fill="#633806">底部填充胶 (Underfill)</text>

  <!-- Substrate -->
  <rect x="55" y="105" width="230" height="55" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="170" y="122" text-anchor="middle" dominant-baseline="central">ABF 封装基板</text>
  <text class="tx" x="170" y="138" text-anchor="middle" dominant-baseline="central">多层有机基板，含内部布线</text>
  <text class="tx" x="170" y="153" text-anchor="middle" dominant-baseline="central">球间距 ~0.8-1.0mm</text>
  <!-- Internal traces -->
  <line x1="90" y1="115" x2="250" y2="115" stroke="#D3D1C7" stroke-width="0.3"/>
  <line x1="90" y1="125" x2="250" y2="125" stroke="#D3D1C7" stroke-width="0.3"/>
  <line x1="90" y1="145" x2="250" y2="145" stroke="#D3D1C7" stroke-width="0.3"/>

  <!-- BGA balls -->
  <circle cx="85" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="115" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="145" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="175" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="205" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="235" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
  <circle cx="260" cy="170" r="5.5" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>

  <!-- PCB -->
  <rect x="45" y="182" width="250" height="18" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="tx" x="170" y="194" text-anchor="middle" dominant-baseline="central">PCB / 主板</text>

  <!-- Wire bonding comparison (small inset) -->
  <rect x="50" y="220" width="290" height="45" rx="6" fill="#F9F9F7" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="tx" x="195" y="238" text-anchor="middle">对比传统打线封装：芯片正面朝上，金线一根根连接焊盘，</text>
  <text class="tx" x="195" y="255" text-anchor="middle">I/O 密度低、电感大、速度受限。FC-BGA 翻转后用焊球替代金线，</text>
  <text class="tx" x="195" y="272" text-anchor="middle">密度提高 10 倍以上，是目前 CPU/GPU 的标配方案。</text>

  <!-- ========== Fan-out SIDE ========== -->

  <!-- Molding compound (outer) -->
  <rect x="430" y="42" width="240" height="100" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="tx" x="550" y="55" text-anchor="middle" fill="#888780">环氧塑封料 (EMC)</text>

  <!-- Die (embedded in molding) -->
  <rect x="470" y="65" width="140" height="45" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="540" y="80" text-anchor="middle" dominant-baseline="central">芯片 (Die)</text>
  <text class="tx" x="540" y="97" text-anchor="middle" dominant-baseline="central">嵌入塑封料中</text>

  <!-- Chip surface pads -->
  <circle cx="495" cy="110" r="3" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="520" cy="110" r="3" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="545" cy="110" r="3" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="570" cy="110" r="3" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="595" cy="110" r="3" fill="#888780" stroke="#5F5E5A" stroke-width="0.3"/>

  <!-- RDL layer(s) -->
  <rect x="445" y="115" width="210" height="4" rx="1" fill="#F4C0D1" stroke="#993556" stroke-width="0.5"/>

  <!-- Fan-out RDL traces (fanning out) -->
  <line x1="495" y1="115" x2="470" y2="130" stroke="#F4C0D1" stroke-width="1" opacity="0.6"/>
  <line x1="520" y1="115" x2="495" y2="130" stroke="#F4C0D1" stroke-width="1" opacity="0.6"/>
  <line x1="545" y1="115" x2="545" y2="130" stroke="#F4C0D1" stroke-width="1" opacity="0.6"/>
  <line x1="570" y1="115" x2="595" y2="130" stroke="#F4C0D1" stroke-width="1" opacity="0.6"/>
  <line x1="595" y1="115" x2="625" y2="130" stroke="#F4C0D1" stroke-width="1" opacity="0.6"/>

  <!-- RDL Layer 2 -->
  <rect x="445" y="131" width="210" height="4" rx="1" fill="#F4C0D1" stroke="#993556" stroke-width="0.5"/>

  <!-- Fan arrow indicators -->
  <text class="tx" x="660" y="124" text-anchor="start">RDL 扇出布线</text>
  <text class="tx" x="660" y="138" text-anchor="start">信号从芯片边缘</text>
  <text class="tx" x="660" y="152" text-anchor="start">"发散"到更大面积</text>

  <!-- Cu pillar / solder bumps (RDL to PCB, no substrate!) -->
  <circle cx="470" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="500" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="530" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="560" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="590" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>
  <circle cx="620" cy="150" r="4.5" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.3"/>

  <!-- PCB -->
  <rect x="435" y="162" width="230" height="18" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="tx" x="550" y="174" text-anchor="middle" dominant-baseline="central">PCB / 主板</text>

  <!-- Fan-out benefit note -->
  <rect x="460" y="220" width="290" height="45" rx="6" fill="#F9F9F7" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="tx" x="605" y="238" text-anchor="middle">无需封装基板——RDL + 塑封料直接替代了基板。封装</text>
  <text class="tx" x="605" y="255" text-anchor="middle">后体积仅比裸芯片大 20% 左右（FC-BGA 要大 2-3 倍）。</text>
  <text class="tx" x="605" y="272" text-anchor="middle">手机/可穿戴设备小型化的核心方案。</text>

  <!-- ========== BOTTOM LEGEND ========== -->
  <rect x="20" y="295" width="760" height="125" rx="8" fill="#F9F9F7" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="th" x="400" y="315" text-anchor="middle">FC-BGA vs Fan-out 核心对比</text>

  <text class="tx" x="40" y="338" text-anchor="start"><tspan font-weight="500">FC-BGA（倒装）：</tspan>芯片翻转有源面朝下，焊球直连封装基板，底部填充保护焊点。需要 ABF 多层基板，</text>
  <text class="tx" x="40" y="355" text-anchor="start">封装体积约为芯片的 2-3 倍。优势是 I/O 密度高（对比打线封装）、散热好、技术成熟。出货量最大。</text>

  <text class="tx" x="40" y="378" text-anchor="start"><tspan font-weight="500">Fan-out（扇出）：</tspan>芯片嵌入塑封料，RDL 将信号从芯片边缘扇出到更大的焊球阵列，</text>
  <text class="tx" x="40" y="395" text-anchor="start">省掉封装基板，体积仅比裸芯片大约 20%。优势是极致小型化、薄型化、低阻抗。台积电 InFO 主力。</text>

  <text class="tx" x="40" y="418" text-anchor="start"><tspan font-weight="500">投资区分：</tspan>FC-BGA 是存量基本盘（CPU/GPU 标配，增速趋缓），Fan-out 是增量弹性盘（手机/穿戴驱动，增长更快）。</text>
</svg>
