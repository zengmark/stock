<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>先进封装竞争格局</title>
  <desc>Foundry（台积电）、IDM（三星/英特尔）、OSAT（日月光/长电/通富/华天）三方竞争格局优劣对比</desc>

  <text x="340" y="36" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A" font-family="sans-serif">先进封装三方竞争格局</text>

  <rect x="145" y="60" width="390" height="52" rx="8" fill="#0C447C" opacity="0.08" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#185FA5" font-family="sans-serif">Foundry 阵营 · 一家独大</text>
  <text x="340" y="100" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="sans-serif">台积电（CoWoS / InFO / SoIC）— 技术与客户双壁垒，产能紧缺</text>

  <line x1="340" y1="112" x2="340" y2="140" stroke="#888780" stroke-width="0.5"/>
  <line x1="145" y1="140" x2="535" y2="140" stroke="#888780" stroke-width="0.5"/>
  <line x1="145" y1="140" x2="145" y2="170" stroke="#888780" stroke-width="0.5"/>
  <line x1="535" y1="140" x2="535" y2="170" stroke="#888780" stroke-width="0.5"/>

  <rect x="30" y="170" width="230" height="52" rx="8" fill="#1D9E75" opacity="0.06" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="145" y="193" text-anchor="middle" font-size="13" font-weight="500" fill="#0F6E56" font-family="sans-serif">IDM 阵营</text>
  <text x="145" y="211" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">三星 I-Cube / X-Cube · 英特尔 EMIB / Foveros</text>

  <rect x="420" y="170" width="230" height="52" rx="8" fill="#7F77DD" opacity="0.06" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="535" y="193" text-anchor="middle" font-size="13" font-weight="500" fill="#534AB7" font-family="sans-serif">OSAT 阵营</text>
  <text x="535" y="211" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">日月光 VIPack · 长电 · 通富 · 华天</text>

  <line x1="145" y1="222" x2="145" y2="250" stroke="#888780" stroke-width="0.5"/>
  <line x1="535" y1="222" x2="535" y2="250" stroke="#888780" stroke-width="0.5"/>

  <rect x="30" y="250" width="230" height="105" rx="6" fill="white" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="145" y="274" text-anchor="middle" font-size="12" font-weight="500" fill="#0F6E56" font-family="sans-serif">优势</text>
  <text x="145" y="296" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">全产业链控制力强</text>
  <text x="145" y="316" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">HBM + 制造 + 封装协同</text>

  <rect x="420" y="250" width="230" height="105" rx="6" fill="white" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="535" y="274" text-anchor="middle" font-size="12" font-weight="500" fill="#534AB7" font-family="sans-serif">优势</text>
  <text x="535" y="296" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">中立第三方，客户面广</text>
  <text x="535" y="316" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">产能弹性大，成本可控</text>

  <rect x="30" y="365" width="230" height="105" rx="6" fill="white" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="145" y="389" text-anchor="middle" font-size="12" font-weight="500" fill="#993C1D" font-family="sans-serif">劣势</text>
  <text x="145" y="411" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">封装主要自用</text>
  <text x="145" y="431" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">外部客户拓展困难</text>

  <rect x="420" y="365" width="230" height="105" rx="6" fill="white" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="535" y="389" text-anchor="middle" font-size="12" font-weight="500" fill="#993C1D" font-family="sans-serif">劣势</text>
  <text x="535" y="411" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">与晶圆制造环节割裂</text>
  <text x="535" y="431" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">先进封装技术追赶较慢</text>

  <rect x="240" y="255" width="200" height="205" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5" opacity="0.9"/>
  <text x="340" y="280" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif">Foundry 优劣势</text>
  <line x1="260" y1="292" x2="420" y2="292" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="340" y="314" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">与芯片制造无缝衔接</text>
  <text x="340" y="334" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">客户黏性极强</text>
  <text x="340" y="358" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">━━━━━━━━━━</text>
  <text x="340" y="380" text-anchor="middle" font-size="11" fill="#993C1D" font-family="sans-serif">产能有限，排他性强</text>
  <text x="340" y="400" text-anchor="middle" font-size="11" fill="#993C1D" font-family="sans-serif">客户担心被绑定</text>

  <line x1="280" y1="475" x2="280" y2="510" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="400" y1="475" x2="400" y2="510" stroke="#D3D1C7" stroke-width="0.5"/>

  <rect x="150" y="510" width="260" height="36" rx="6" fill="#F1EFE8"/>
  <text x="280" y="533" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="sans-serif">核心趋势：Chiplet 生态利好中立 OSAT</text>

  <rect x="420" y="510" width="220" height="36" rx="6" fill="#F1EFE8"/>
  <text x="530" y="533" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="sans-serif">CoWoS 外溢 → OSAT 受益</text>
</svg>
