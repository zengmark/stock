<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>先进封装市场规模趋势</title>
  <desc>全球与中国先进封装市场规模趋势（2022-2030），全球市场CAGR约9.4%，中国市场CAGR约18.7%</desc>

  <rect x="40" y="30" width="600" height="370" fill="white" stroke="none" rx="6"/>

  <text x="340" y="58" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A" font-family="sans-serif">全球与中国先进封装市场规模趋势</text>

  <line x1="90" y1="80" x2="90" y2="340" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="340" x2="640" y2="340" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Y-axis labels (全球, 亿美元) -->
  <text x="82" y="340" text-anchor="end" font-size="11" fill="#5F5E5A" font-family="sans-serif">0</text>
  <text x="82" y="290" text-anchor="end" font-size="11" fill="#5F5E5A" font-family="sans-serif">200</text>
  <text x="82" y="240" text-anchor="end" font-size="11" fill="#5F5E5A" font-family="sans-serif">400</text>
  <text x="82" y="190" text-anchor="end" font-size="11" fill="#5F5E5A" font-family="sans-serif">600</text>
  <text x="82" y="140" text-anchor="end" font-size="11" fill="#5F5E5A" font-family="sans-serif">800</text>

  <!-- Guide lines -->
  <line x1="92" y1="290" x2="640" y2="290" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="92" y1="240" x2="640" y2="240" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="92" y1="190" x2="640" y2="190" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="92" y1="140" x2="640" y2="140" stroke="#F1EFE8" stroke-width="0.5"/>

  <!-- X-axis labels -->
  <text x="160" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2022</text>
  <text x="230" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2023</text>
  <text x="295" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2024</text>
  <text x="365" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2025E</text>
  <text x="430" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2026E</text>
  <text x="500" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2028E</text>
  <text x="590" y="360" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">2030E</text>

  <!-- 全球市场 bars (亿美元, scale: 1=0.325px) -->
  <!-- 2022: 367 → y=340-367*0.325=340-119=221 -->
  <rect x="130" y="221" width="60" height="119" rx="3" fill="#3266ad" opacity="0.7"/>
  <text x="160" y="215" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">367</text>

  <!-- 2023: 439 → y=340-439*0.325=340-143=197 -->
  <rect x="200" y="197" width="60" height="143" rx="3" fill="#3266ad" opacity="0.7"/>
  <text x="230" y="191" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">439</text>

  <!-- 2024: 450 → y=340-450*0.325=340-146=194 -->
  <rect x="265" y="194" width="60" height="146" rx="3" fill="#3266ad" opacity="0.7"/>
  <text x="295" y="188" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">450</text>

  <!-- 2025E: 510 → y=340-510*0.325=340-166=174 -->
  <rect x="335" y="174" width="60" height="166" rx="3" fill="#3266ad" opacity="0.4"/>
  <text x="365" y="168" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">510</text>

  <!-- 2026E: 570 → y=340-570*0.325=340-185=155 -->
  <rect x="400" y="155" width="60" height="185" rx="3" fill="#3266ad" opacity="0.4"/>
  <text x="430" y="149" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">570</text>

  <!-- 2028E: 720 → y=340-720*0.325=340-234=106 -->
  <rect x="470" y="106" width="60" height="234" rx="3" fill="#3266ad" opacity="0.4"/>
  <text x="500" y="100" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">720</text>

  <!-- 2030E: 800 → y=340-800*0.325=340-260=80 -->
  <rect x="560" y="80" width="60" height="260" rx="3" fill="#3266ad" opacity="0.4"/>
  <text x="590" y="74" text-anchor="middle" font-size="11" fill="#3266ad" font-family="sans-serif">800</text>

  <!-- China market line (十亿RMB, right axis, scale: 1=1.2px) -->
  <!-- 2022: 35.1 → y=340-35.1*1.2=340-42=298 -->
  <!-- 2023: 52 → y=340-52*1.2=340-62=278 -->
  <!-- 2024: 69.8 → y=340-69.8*1.2=340-84=256 -->
  <!-- 2025E: 85.2 → y=340-85.2*1.2=340-102=238 -->
  <!-- 2026E: 102 → y=340-102*1.2=340-122=218 -->
  <!-- 2028E: 135 → y=340-135*1.2=340-162=178 -->
  <!-- 2030E: 165 → y=340-165*1.2=340-198=142 -->

  <polyline points="160,298 230,278 295,256 365,238 430,218 500,178 590,142"
    fill="none" stroke="#d4537e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="160" cy="298" r="4" fill="#d4537e"/>
  <circle cx="230" cy="278" r="4" fill="#d4537e"/>
  <circle cx="295" cy="256" r="4" fill="#d4537e"/>
  <circle cx="365" cy="238" r="4" fill="#d4537e"/>
  <circle cx="430" cy="218" r="4" fill="#d4537e"/>
  <circle cx="500" cy="178" r="4" fill="#d4537e"/>
  <circle cx="590" cy="142" r="4" fill="#d4537e"/>

  <!-- China market labels -->
  <text x="160" y="292" text-anchor="middle" font-size="10" fill="#d4537e" font-family="sans-serif">35</text>
  <text x="295" y="250" text-anchor="middle" font-size="10" fill="#d4537e" font-family="sans-serif">70</text>
  <text x="430" y="212" text-anchor="middle" font-size="10" fill="#d4537e" font-family="sans-serif">102</text>
  <text x="590" y="136" text-anchor="middle" font-size="10" fill="#d4537e" font-family="sans-serif">165</text>

  <!-- Legend -->
  <rect x="100" y="380" width="14" height="14" rx="2" fill="#3266ad" opacity="0.7"/>
  <text x="120" y="392" font-size="11" fill="#5F5E5A" font-family="sans-serif">全球市场（亿美元）</text>

  <line x1="300" y1="387" x2="320" y2="387" stroke="#d4537e" stroke-width="2.5"/>
  <circle cx="310" cy="387" r="3" fill="#d4537e"/>
  <text x="326" y="392" font-size="11" fill="#5F5E5A" font-family="sans-serif">中国市场（十亿RMB）</text>

  <text x="620" y="78" font-size="10" fill="#5F5E5A" font-family="sans-serif" font-style="italic">CAGR 9.4%</text>
  <text x="592" y="128" font-size="10" fill="#d4537e" font-family="sans-serif" font-style="italic">CAGR 18.7%</text>
</svg>
