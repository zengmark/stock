<svg width="100%" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>先进封装技术演化路线</title>
  <desc>从传统封装到Chiplet时代的技术演进全景图</desc>

  <rect x="160" y="30" width="360" height="42" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="56" text-anchor="middle" font-size="13" font-weight="500" fill="#5F5E5A" font-family="sans-serif">传统封装（DIP / QFP / BGA）</text>

  <line x1="340" y1="72" x2="340" y2="105" stroke="#888780" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="160" y="105" width="360" height="42" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="123" text-anchor="middle" font-size="13" font-weight="500" fill="#185FA5" font-family="sans-serif">先进封装 1.0：FC-BGA · Fan-out · WLCSP</text>
  <text x="340" y="139" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">成熟工艺，量大利薄</text>

  <line x1="340" y1="147" x2="340" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="160" y="180" width="360" height="56" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="340" y="200" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A" font-family="sans-serif">先进封装 2.0：2.5D（CoWoS）· 3D（HBM / SoIC）</text>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">当前核心增量，利润最厚</text>

  <line x1="340" y1="236" x2="340" y2="270" stroke="#888780" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="120" y="270" width="440" height="56" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="340" y="290" text-anchor="middle" font-size="13" font-weight="500" fill="#534AB7" font-family="sans-serif">Chiplet 时代：设计理念 → 封装平台化</text>
  <text x="340" y="308" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">未来 3-5 年的主旋律</text>

  <rect x="80" y="360" width="200" height="40" rx="4" fill="#D3D1C7" opacity="0.3"/>
  <text x="180" y="384" text-anchor="middle" font-size="11" fill="#2C2C2A" font-family="sans-serif">投资优先级：2.5D/3D → Chiplet → Fan-out/FC-BGA → 传统封装</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
