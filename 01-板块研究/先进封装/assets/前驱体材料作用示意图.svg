<svg role="img" width="100%" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <title>前驱体材料在先进封装中的作用</title>
  <desc>展示前驱体材料如何在TSV和RDL工艺中沉积薄膜</desc>
  <style>
    .t  { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #3C3489; font-weight: 500; }
    .th { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #3C3489; font-weight: 500; }
    .ts { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; fill: #5F5E5A; font-weight: 400; }
    .tx { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 11px; fill: #5F5E5A; font-weight: 400; }
    .tn { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 10px; fill: #888780; font-weight: 400; }
  </style>

  <!-- Background -->
  <rect x="15" y="8" width="770" height="465" rx="10" fill="#F9F9F7" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Title -->
  <text class="t" x="400" y="32" text-anchor="middle">前驱体材料是什么？——先进封装的「涂层原料」</text>
  <text class="tx" x="400" y="50" text-anchor="middle">前驱体 = 化学气体/液体，通过 ALD/CVD 设备在芯片表面沉积纳米级薄膜</text>

  <!-- ========== LEFT: TSV 工艺 ========== -->
  <text class="th" x="200" y="78" text-anchor="middle">场景一：TSV 通孔镀铜前的准备</text>

  <!-- Silicon substrate with TSV hole -->
  <rect x="50" y="90" width="300" height="180" rx="5" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="tx" x="200" y="105" text-anchor="middle" fill="#0F6E56">硅晶圆</text>

  <!-- TSV hole -->
  <rect x="150" y="130" width="40" height="140" rx="2" fill="#F9F9F7" stroke="#D85A30" stroke-width="1.5"/>
  <text class="tn" x="170" y="200" text-anchor="middle" fill="#D85A30">TSV
通孔</text>

  <!-- Step 1: Barrier layer -->
  <rect x="150" y="130" width="40" height="140" rx="2" fill="none" stroke="#993556" stroke-width="3" opacity="0.6"/>
  <text class="tn" x="115" y="160" text-anchor="end">Step 1</text>
  <text class="tx" x="115" y="175" text-anchor="end">沉积阻挡层</text>
  <text class="tx" x="115" y="188" text-anchor="end">(Ta/TaN)</text>
  
  <!-- Arrow from precursor to barrier -->
  <line x1="90" y1="165" x2="148" y2="165" stroke="#993556" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text class="tn" x="90" y="155" text-anchor="middle">前驱体
TaCl₅</text>

  <!-- Step 2: Seed layer -->
  <rect x="154" y="134" width="32" height="132" rx="1" fill="none" stroke="#534AB7" stroke-width="3" opacity="0.5"/>
  <text class="tn" x="250" y="160" text-anchor="start">Step 2</text>
  <text class="tx" x="250" y="175" text-anchor="start">沉积铜种子层</text>
  <text class="tx" x="250" y="188" text-anchor="start">(Cu)</text>

  <!-- Arrow from precursor to seed -->
  <line x1="290" y1="165" x2="188" y2="165" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text class="tn" x="300" y="155" text-anchor="middle">前驱体
Cu(hfac)₂</text>

  <!-- Step 3: Copper fill -->
  <rect x="158" y="138" width="24" height="128" rx="1" fill="#888780" opacity="0.7"/>
  <text class="tn" x="170" y="270" text-anchor="middle">Step 3: 电镀铜填充</text>

  <!-- ========== RIGHT: RDL 工艺 ========== -->
  <text class="th" x="600" y="78" text-anchor="middle">场景二：RDL 重布线层制造</text>

  <!-- Die surface -->
  <rect x="450" y="90" width="300" height="40" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="tx" x="600" y="115" text-anchor="middle">芯片表面 (Die)</text>

  <!-- Dielectric layer (SiO2) -->
  <rect x="450" y="132" width="300" height="25" rx="2" fill="#F4C0D1" stroke="#993556" stroke-width="0.5" opacity="0.6"/>
  <text class="tx" x="600" y="148" text-anchor="middle">介电层 SiO₂ —— 由前驱体 TEOS 沉积</text>

  <!-- Metal trace (Cu) -->
  <rect x="480" y="158" width="100" height="12" rx="2" fill="#888780" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="tn" x="530" y="166" text-anchor="middle" fill="white">铜线路</text>
  <text class="tx" x="600" y="180" text-anchor="middle">铜线路 —— 由前驱体沉积铜种子层后电镀</text>

  <!-- Another dielectric layer -->
  <rect x="450" y="175" width="300" height="20" rx="2" fill="#F4C0D1" stroke="#993556" stroke-width="0.5" opacity="0.6"/>
  <text class="tx" x="600" y="188" text-anchor="middle">下一层介电层</text>

  <!-- Passivation -->
  <rect x="450" y="198" width="300" height="15" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="tx" x="600" y="208" text-anchor="middle">钝化保护层</text>

  <!-- ========== BOTTOM: What is precursor ========== -->
  <rect x="35" y="285" width="730" height="175" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  
  <text class="th" x="400" y="310" text-anchor="middle">前驱体到底是什么？</text>

  <!-- Definition box -->
  <text class="tx" x="50" y="335" text-anchor="start"><tspan font-weight="500">化学本质：</tspan>前驱体是含有目标元素（如 Ta、Cu、Si）的有机金属化合物或气体，在 ALD/CVD 设备中被加热/电离后，</text>
  <text class="tx" x="50" y="352" text-anchor="start">化学反应在晶圆表面「生长」出超薄薄膜（几纳米到几十纳米）。</text>

  <!-- Analogy -->
  <text class="tx" x="50" y="375" text-anchor="start"><tspan font-weight="500">通俗类比：</tspan>就像「喷漆」——喷枪（ALD/CVD设备）把油漆（前驱体）均匀喷涂在物体表面，形成保护层。</text>
  <text class="tx" x="50" y="392" text-anchor="start">不同的是，前驱体沉积的薄膜只有几纳米厚，且原子级均匀。</text>

  <!-- Why important -->
  <text class="tx" x="50" y="415" text-anchor="start"><tspan font-weight="500">为什么在先进封装中不可或缺？</tspan></text>
  <text class="tx" x="50" y="432" text-anchor="start">• TSV 通孔必须先沉积阻挡层（防止铜扩散到硅中）+ 种子层（让电镀铜能附着生长）</text>
  <text class="tx" x="50" y="449" text-anchor="start">• RDL 每层金属线路之间需要绝缘的介电层，介电层由前驱体沉积而成</text>

  <!-- Business model -->
  <text class="tn" x="400" y="470" text-anchor="middle">💡 生意模式：ALD/CVD 设备卖一次，前驱体持续消耗 → 封装产能越扩，前驱体用量越大</text>
</svg>
